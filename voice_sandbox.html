<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Voice Sandbox • SensirenGPT</title>
  <style>
    :root { color-scheme: dark; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:#0b0b10; color:#e9e9ef; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 18px; }
    .card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10); border-radius: 16px; padding: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.35); }
    h1 { font-size: 18px; margin: 0 0 6px; }
    .sub { font-size: 13px; opacity: 0.85; margin: 0 0 12px; line-height: 1.4; }
    .row { display:flex; gap:10px; flex-wrap: wrap; align-items:center; }
    button {
      padding: 12px 14px; border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.08);
      color:#e9e9ef; cursor:pointer;
    }
    button:hover { background: rgba(255,255,255,0.12); }
    button:disabled { opacity: 0.55; cursor:not-allowed; }
    #recBtn.recording {
      background: rgba(255,80,120,0.25);
      border-color: rgba(255,80,120,0.38);
    }
    .pill { padding: 10px 12px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.12); background: rgba(0,0,0,0.25); }
    .tiny { font-size: 12px; opacity: 0.82; margin-top: 10px; line-height: 1.35; }
    .list { margin-top: 12px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.10); background: rgba(0,0,0,0.28); overflow:hidden; }
    .item { display:flex; gap:10px; align-items:center; justify-content:space-between; padding: 10px 12px; border-top: 1px solid rgba(255,255,255,0.08); }
    .item:first-child { border-top:none; }
    .meta { display:flex; flex-direction:column; gap:2px; }
    .title { font-size: 13px; }
    .time { font-size: 12px; opacity:0.8; }
    .actions { display:flex; gap:10px; align-items:center; }
    a.dl { font-size: 12px; opacity:0.9; text-decoration:none; border: 1px solid rgba(255,255,255,0.14); border-radius: 12px; padding: 8px 10px; background: rgba(255,255,255,0.06); color:#e9e9ef; }
    a.dl:hover { background: rgba(255,255,255,0.10); }
    audio { width: 260px; max-width: 55vw; }
    .warn { color: #ffd1dc; }
    .kbd { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; padding: 2px 6px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.14); background: rgba(0,0,0,0.35); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Voice Sandbox 🎙️</h1>
      <p class="sub">
        Training wheels only: <span class="kbd">hold → talk → release → saved</span>.
        Works offline. Stores recordings locally on your device (IndexedDB).
      </p>

      <div class="row">
        <button id="recBtn">🎙️ Hold to Record</button>
        <button id="exportBtn">Export Index (JSON)</button>
        <button id="clearBtn" title="Clears local recordings list + blobs on this device">Reset Sandbox</button>
        <span class="pill" id="status">Status: ready</span>
      </div>

      <div class="tiny">
        If the mic button does nothing, make sure Chrome has mic permission for this page.
      </div>

      <div class="list" id="list"></div>
      <div class="tiny" id="count"></div>
    </div>
  </div>

<script>
const DB_NAME = "voice_sandbox_db";
const DB_VERSION = 1;
const STORE = "clips";

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE)) {
        const os = db.createObjectStore(STORE, { keyPath: "id" });
        os.createIndex("ts", "ts");
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function putClip(clip) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readwrite");
    tx.objectStore(STORE).put(clip);
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}

async function getAllClips() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readonly");
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

async function clearAll() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readwrite");
    tx.objectStore(STORE).clear();
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}

const recBtn = document.getElementById("recBtn");
const exportBtn = document.getElementById("exportBtn");
const clearBtn = document.getElementById("clearBtn");
const statusEl = document.getElementById("status");
const listEl = document.getElementById("list");
const countEl = document.getElementById("count");

let mediaRecorder = null;
let chunks = [];
let recording = false;

function uid() {
  return crypto.randomUUID ? crypto.randomUUID() : (Date.now()+"-"+Math.random().toString(16).slice(2));
}
function setStatus(s) { statusEl.textContent = "Status: " + s; }
function fmtTime(ts) { return new Date(ts).toLocaleString(); }
function supportsMedia() { return !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia); }

async function render() {
  const clips = await getAllClips();
  clips.sort((a,b) => b.ts - a.ts);

  listEl.innerHTML = "";
  if (!clips.length) {
    listEl.innerHTML = `<div class="item"><div class="meta"><div class="title">No recordings yet.</div><div class="time">Hold the mic button to create one.</div></div></div>`;
    countEl.textContent = "";
    return;
  }

  for (const c of clips) {
    const row = document.createElement("div");
    row.className = "item";

    const meta = document.createElement("div");
    meta.className = "meta";
    const title = document.createElement("div");
    title.className = "title";
    title.textContent = c.name || "Voice memo";
    const time = document.createElement("div");
    time.className = "time";
    time.textContent = fmtTime(c.ts);
    meta.appendChild(title);
    meta.appendChild(time);

    const actions = document.createElement("div");
    actions.className = "actions";

    const audio = document.createElement("audio");
    audio.controls = true;
    const url = URL.createObjectURL(c.blob);
    audio.src = url;
    audio.onended = () => URL.revokeObjectURL(url);

    const dl = document.createElement("a");
    dl.className = "dl";
    dl.textContent = "Download";
    dl.href = url;
    dl.download = c.filename || `voice_${new Date(c.ts).toISOString().replace(/[:.]/g,"-")}.webm`;

    actions.appendChild(audio);
    actions.appendChild(dl);

    row.appendChild(meta);
    row.appendChild(actions);
    listEl.appendChild(row);
  }

  countEl.textContent = `Saved locally: ${clips.length} recording(s).`;
}

async function startRecording() {
  if (recording) return;
  if (!supportsMedia()) { alert("Mic recording not supported in this browser."); return; }

  try {
    setStatus("requesting mic…");
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    const mime =
      MediaRecorder.isTypeSupported("audio/webm;codecs=opus") ? "audio/webm;codecs=opus" :
      MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" :
      "";

    mediaRecorder = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream);
    chunks = [];
    recording = true;

    mediaRecorder.ondataavailable = (e) => {
      if (e.data && e.data.size) chunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      try {
        setStatus("saving…");
        const blob = new Blob(chunks, { type: mediaRecorder.mimeType || "audio/webm" });

        const ts = Date.now();
        const id = uid();
        const iso = new Date(ts).toISOString().replace(/[:.]/g, "-");
        const ext = (blob.type.includes("webm")) ? "webm" : "dat";
        const clip = { id, ts, name: `Voice memo`, filename: `voice_${iso}.${ext}`, mime: blob.type, blob };

        await putClip(clip);
        setStatus("saved ✅");
        await render();
      } finally {
        stream.getTracks().forEach(t => t.stop());
      }
    };

    mediaRecorder.start();
    recBtn.classList.add("recording");
    recBtn.textContent = "⏺️ Recording… release to save";
    setStatus("recording…");
  } catch (e) {
    console.error(e);
    setStatus("ready");
    alert("Could not access microphone. Check permissions.");
  }
}

function stopRecording() {
  if (!recording) return;
  recording = false;
  recBtn.classList.remove("recording");
  recBtn.textContent = "🎙️ Hold to Record";
  if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
}

recBtn.addEventListener("mousedown", startRecording);
recBtn.addEventListener("touchstart", (e) => { e.preventDefault(); startRecording(); }, { passive: false });
["mouseup","mouseleave","touchend","touchcancel"].forEach(evt => recBtn.addEventListener(evt, stopRecording));

exportBtn.addEventListener("click", async () => {
  const clips = await getAllClips();
  clips.sort((a,b) => a.ts - b.ts);
  const index = clips.map(c => ({ id: c.id, ts: c.ts, name: c.name, filename: c.filename, mime: c.mime, size: c.blob?.size || null }));
  const payload = { app: "Voice Sandbox • SensirenGPT", exported_at: new Date().toISOString(), note: "Index only. Audio blobs stay on-device.", clips: index };

  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `voice_sandbox_index_${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 2000);
  setStatus("exported index ✅");
});

clearBtn.addEventListener("click", async () => {
  const ok = confirm("Reset sandbox on this device? This clears all local recordings in this sandbox DB.");
  if (!ok) return;
  await clearAll();
  await render();
  setStatus("reset ✅");
});

(async () => { await render(); setStatus("ready"); })();
</script>
</body>
</html>
